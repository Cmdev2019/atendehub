# ─────────────────────────────────────────────────────────────────────────────
# AtendeHub — Infraestrutura local de desenvolvimento
# Sobe: PostgreSQL · Redis · MinIO · Evolution API
# Uso: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: atendehub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atendehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atendehub_secret}
      POSTGRES_DB: ${POSTGRES_DB:-atendehub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atendehub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atendehub_net

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atendehub_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atendehub_net

  # ── MinIO (S3 compatível — armazena mídias do WhatsApp) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: atendehub_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-atendehub_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - atendehub_net

  # ── MinIO Init — cria bucket padrão na primeira inicialização ───────────────
  minio_init:
    image: minio/mc:latest
    container_name: atendehub_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-atendehub_minio} ${MINIO_ROOT_PASSWORD:-minio_secret_123};
        mc mb --ignore-existing local/atendehub-media;
        mc anonymous set download local/atendehub-media;
        echo 'Bucket atendehub-media criado.';
      "
    networks:
      - atendehub_net

  # ── Evolution API v2 (camada WhatsApp / Baileys) ─────────────────────────────
  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: atendehub_evolution
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evolution_api_key_dev}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-atendehub}:${POSTGRES_PASSWORD:-atendehub_secret}@postgres:5432/${POSTGRES_DB:-atendehub}
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_URL:-http://host.docker.internal:3001/webhooks/evolution}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_MESSAGES_DELETE: "true"
      WEBHOOK_EVENTS_SEND_MESSAGE: "true"
      WEBHOOK_EVENTS_CONTACTS_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      STORAGE_ENABLED: "true"
      STORAGE_PROVIDER: s3
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-atendehub_minio}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
      STORAGE_BUCKET: atendehub-media
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_FORCE_PATH_STYLE: "true"
      STORAGE_REGION: us-east-1
    volumes:
      - evolution_data:/evolution/instances
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - atendehub_net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  evolution_data:

# ─── Redes ────────────────────────────────────────────────────────────────────
networks:
  atendehub_net:
    driver: bridge
